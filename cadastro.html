<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>

    <header>
        <h1>Baby Safe</h1>   
    </header>
    <main>
        <div class="cabecalho-progresso">  
            <p>Cadastro de pai/mãe</p>

            <div class="fileira-etapas">
                <div class="item-etapa ativo">
                    <div class="numero-etapa">1</div>   
                    <span class="rotulo-etapa">Localização</span>
                </div>
                <div class="item-etapa">
                    <div class="numero-etapa">2</div>
                    <span class="rotulo-etapa">Sua Criança</span>   
                </div>
                <div class="item-etapa">
                    <div class="numero-etapa">3</div>
                    <span class="rotulo-etapa">Tipo de Cuidado</span>
                </div>
                <div class="item-etapa">
                    <div class="numero-etapa">4</div>
                    <span class="rotulo-etapa">Seu Perfil</span>
                </div>
            </div>
        </div>   
        <div class="area-formulario">
            <div id="etapa-1" class="cartao-formulario">
                <h2> Onde você está? </h2>
                <p class="subtitulo">Usaremos sua localização para encontrar babás próximas a você.</p>

                <div class="campo">
                    <label for="cep">CEP</label>
                    <input type="text" id="cep" placeholder="00000-000" maxlength="9">
                </div>
                 <div class="campo">
                    <label for="endereco">Endereço</label>
                    <input type="text" id="endereco" placeholder="Preenchido Automaticamente">
                </div>
                <div class="botoes">
                    <button class="btn-secundario">Usar minha localização atual</button>
                    <button class="btn-primario" onclick="irParaEtapa(2)">Continuar</button>
                </div> 
            </div>  
            <div id="etapa-2" class="cartao-formulario" style="display:none">
                <h2>Conte Sobre sua criança.</h2>
                <p class="subtitulo">Você poderá adicionar mais crianças depois de concluir.</p>

                <label class="campo-label">Seu filho é...</label>
                <div class="genero-row">
                    <button class="genero-btn sel" onclick="selecionarGenero(this)">Menino</button>
                    <button class="genero-btn" onclick="selecionarGenero(this)">Menina</button>
                </div>
                <div class="linha-dupla">
                    <div class="campo">
                        <label for="nome">Nome da criança</label>
                        <input type="text" id="nome" placeholder="Ex:Pedro">
                    </div>
                    <div class="campo">
                        <label for="nascimento">Data de nascimento</label>
                        <input type="text" id="nascimento" placeholder="dd/mm/aaaa">
                    </div>
                </div>
                <div class="campo">
                    <label for="descricao">Descreva seu filho</label>
                    <textarea id="descricao" placeholder="Fale sobre a personalidade, rotina e necessidades dele..."></textarea>
                </div>
                <hr class="divisor">

                <div class="add-filho">
                    <div class="add-icone">+</div>
                    Adicionar outra criança
                </div>

                <div class="botoes">
                    <button class="btn-voltar" onclick="irParaEtapa(1)">← Voltar</button>
                    <button class="btn-primario" onclick="irParaEtapa(3)">Continuar →</button>
                </div>
            </div>  
        </div> 
        
    </main>
    <footer>

    </footer>
    <script src="cadastro.js"></script>
</body>
</html>
